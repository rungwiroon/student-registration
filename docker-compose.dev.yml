services:
  api:
    build:
      context: ./CsrApi
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__DefaultConnection: Data Source=/app/data/csrapi-dev.db;Password=SuperSecretDbPassword123!;
      EncryptionKey: my_super_secret_encryption_key_256
      Line__UseMockAuth: "true"
      Line__MockUserId: mock-line-user-id
      SeedData__Enabled: "true"
    volumes:
      - ./CsrApi:/src
      - app_data:/app/data
      - nuget_cache:/root/.nuget/packages

  frontend:
    build:
      context: ./csr-frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      CSR_API_PROXY_TARGET: http://api:8080
      VITE_USE_MOCK_LIFF: "true"
      VITE_LIFF_ID: ""
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./csr-frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  app_data:
  nuget_cache:
  frontend_node_modules:
