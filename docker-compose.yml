version: '3.8'

services:
  api:
    build:
      context: ./CsrApi
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/csrapi.db;Password=SuperSecretDbPassword123!;
    volumes:
      - app_data:/app/data

volumes:
  app_data:
